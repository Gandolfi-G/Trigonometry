  <circle cx="90" cy="70" r="5" fill="#ffffff"/>
  <g stroke="#ffffff" stroke-width="2" fill="none">
    <path d="M145 90h64"/>
    <path d="M110 122h-58"/>
    <path d="M92 67L44 26"/>
