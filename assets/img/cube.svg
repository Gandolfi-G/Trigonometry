<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" role="img" aria-labelledby="cubeTitle cubeDesc">
  <title id="cubeTitle">Cube annote</title>
  <desc id="cubeDesc">Schema simple d'un cube avec une face, une arete et un sommet.</desc>
  <defs>
    <linearGradient id="faceFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#49dcb1"/>
      <stop offset="100%" stop-color="#177c78"/>
    </linearGradient>
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#b26c16"/>
    </linearGradient>
    <linearGradient id="faceSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6bd2ff"/>
      <stop offset="100%" stop-color="#2d728f"/>
    </linearGradient>
  </defs>
  <rect width="320" height="240" rx="24" fill="#08151f"/>
  <polygon points="90,70 190,70 230,40 130,40" fill="url(#faceTop)" opacity="0.95"/>
  <polygon points="190,70 230,40 230,140 190,170" fill="url(#faceSide)" opacity="0.92"/>
